version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: colorimetry_mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - colorimetry_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: colorimetry_backend
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongodb:27017/colorimetry
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
    networks:
      - colorimetry_net

  ml:
    build:
      context: ./ml-server
      dockerfile: Dockerfile
    container_name: colorimetry_ml
    restart: unless-stopped
    networks:
      - colorimetry_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: colorimetry_frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
      - ml
    networks:
      - colorimetry_net

volumes:
  mongo_data:

networks:
  colorimetry_net:
    driver: bridge
